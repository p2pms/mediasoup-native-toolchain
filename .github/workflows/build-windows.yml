# ==================================================================================================
# Build mediasoup-native-toolchain for Windows x64
# ==================================================================================================
# This workflow:
#   1. Builds WebRTC from source (GN/Ninja, ~2 hours)
#   2. Builds libmediasoupclient (CMake, ~5 min)
#   3. Packages both into a combined zip archive
#   4. Publishes the archive as a GitHub Release
# ==================================================================================================

name: Build Windows x64

on:
  workflow_dispatch:
    inputs:
      webrtc_branch:
        description: 'WebRTC branch (e.g. branch-heads/6099)'
        required: false
        default: 'branch-heads/6099'
      mediasoupclient_version:
        description: 'libmediasoupclient version tag'
        required: false
        default: '3.4.3'
      config:
        description: 'Build configuration'
        required: false
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug
  schedule:
    # Weekly build: Sunday 20:00 UTC (Monday 04:00 CST)
    - cron: '0 20 * * 0'

permissions:
  contents: write

env:
  WEBRTC_BRANCH: ${{ github.event.inputs.webrtc_branch || 'branch-heads/6099' }}
  MEDIASOUPCLIENT_VERSION: ${{ github.event.inputs.mediasoupclient_version || '3.4.3' }}
  CONFIG: ${{ github.event.inputs.config || 'Release' }}
  ARCH: x64

jobs:
  build-windows-x64:
    runs-on: windows-2022
    # WebRTC build typically takes 120-150 minutes
    timeout-minutes: 240

    steps:
      # --------------------------------------------------------------------------------------------
      # Step 1: Checkout
      # --------------------------------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------------------------------------------------
      # Step 2: Setup Python
      # --------------------------------------------------------------------------------------------
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install pyyaml

      # --------------------------------------------------------------------------------------------
      # Step 3: Configure Git for WebRTC (long paths, no autocrlf)
      # --------------------------------------------------------------------------------------------
      - name: Configure Git
        run: |
          git config --global core.autocrlf false
          git config --global core.longpaths true
          git config --global core.fscache true
          git config --global core.preloadindex true

      # --------------------------------------------------------------------------------------------
      # Step 4: Cache/Restore WebRTC build output
      # --------------------------------------------------------------------------------------------
      - name: Cache WebRTC
        id: cache-webrtc
        uses: actions/cache@v4
        with:
          path: output/webrtc/
          key: webrtc-${{ env.WEBRTC_BRANCH }}-${{ env.ARCH }}-${{ env.CONFIG }}

      # --------------------------------------------------------------------------------------------
      # Step 5: Build WebRTC from source (skipped when cache hits)
      # --------------------------------------------------------------------------------------------
      - name: Build WebRTC
        if: steps.cache-webrtc.outputs.cache-hit != 'true'
        run: |
          python scripts/build_webrtc.py `
            --branch "$env:WEBRTC_BRANCH" `
            --config $env:CONFIG `
            --arch $env:ARCH `
            --build
        shell: pwsh
        # Expected runtime: ~120-150 minutes

      # --------------------------------------------------------------------------------------------
      # Step 6: Build libmediasoupclient
      # --------------------------------------------------------------------------------------------
      - name: Build libmediasoupclient
        run: |
          python scripts/build_mediasoupclient.py `
            --version "$env:MEDIASOUPCLIENT_VERSION" `
            --config $env:CONFIG `
            --arch $env:ARCH `
            --build --jobs 8
        shell: pwsh
        # Expected runtime: ~5-10 minutes

      # --------------------------------------------------------------------------------------------
      # Step 7: Package combined toolchain
      # --------------------------------------------------------------------------------------------
      - name: Package toolchain
        run: |
          python scripts/package_toolchain.py `
            --webrtc-branch "$env:WEBRTC_BRANCH" `
            --mediasoupclient-version "$env:MEDIASOUPCLIENT_VERSION" `
            --config $env:CONFIG `
            --arch $env:ARCH
        shell: pwsh

      # --------------------------------------------------------------------------------------------
      # Step 8: Determine release tag
      # --------------------------------------------------------------------------------------------
      - name: Generate release tag
        id: tag
        run: |
          $webrtcTag = "$env:WEBRTC_BRANCH" -replace '/', '-'
          $msTag = "$env:MEDIASOUPCLIENT_VERSION" -replace '/', '-'
          $tag = "webrtc-$webrtcTag-ms-$msTag-$env:CONFIG-b${{ github.run_number }}"
          echo "release_tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          echo "archive_name=mediasoup-native-toolchain-windows-$env:ARCH-$env:CONFIG.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        shell: pwsh

      # --------------------------------------------------------------------------------------------
      # Step 9: Create GitHub Release with artifacts
      # --------------------------------------------------------------------------------------------
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "mediasoup-native-toolchain ${{ steps.tag.outputs.release_tag }}"
          body: |
            ## mediasoup-native-toolchain

            | Component | Version |
            |-----------|---------|
            | WebRTC | `${{ env.WEBRTC_BRANCH }}` |
            | libmediasoupclient | `${{ env.MEDIASOUPCLIENT_VERSION }}` |
            | Platform | Windows x64 |
            | Configuration | ${{ env.CONFIG }} |

            ### Contents

            - `${{ steps.tag.outputs.archive_name }}` — Combined pre-built toolchain
            - `VERSIONS.json` — Version manifest with SHA256 checksums

            ### Usage

            ```bash
            # Download and extract
            python tools/build/download_deps.py
            ```
          files: |
            output/archive/mediasoup-native-toolchain-windows-x64-${{ env.CONFIG }}.zip
            output/archive/VERSIONS.json
          generate_release_notes: false
          make_latest: true
