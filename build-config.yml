# ==================================================================================================
# mediasoup-native-toolchain build configuration
# Single source of truth for all build parameters.
# Python build scripts and CI workflows read defaults from this file.
# To upgrade WebRTC or mediasoupclient, edit this file only.
# ==================================================================================================

# --------------------------------------------------------------------------------------------------
# WebRTC build parameters
# --------------------------------------------------------------------------------------------------
webrtc:
  default_branch: "branch-heads/6099"    # WebRTC branch (M119/M120)
  gn_args:
    rtc_use_h264: true                   # Enable H.264 encoding
    proprietary_codecs: true             # Enable proprietary codecs (H.264)
    use_rtti: true                       # Enable RTTI (required by Qt)
    use_custom_libcxx: false             # Use MSVC STL instead of libc++
    treat_warnings_as_errors: false      # Do not treat warnings as errors

# --------------------------------------------------------------------------------------------------
# libmediasoupclient build parameters
# --------------------------------------------------------------------------------------------------
mediasoupclient:
  default_version: "3.4.3"              # libmediasoupclient git tag

# --------------------------------------------------------------------------------------------------
# Common toolchain build parameters
# --------------------------------------------------------------------------------------------------
toolchain:
  default_config: "Release"              # Default build configuration
  default_arch: "x64"                    # Default target architecture
